<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>ISB Personnel Database - Coruscant Shadow Node</title>
    <meta name="title" content="Imperial Security Bureau - Terminal 47-B">
    <meta name="description" content="Accessing encrypted Galactic Personnel Database. Uploading new dossier.">
    <meta name="theme-color" content="#ef4444">
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Load html2canvas for Discord image copying -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- Aurebesh Font -->
    <link href="https://fonts.cdnfonts.com/css/aurebesh" rel="stylesheet">

    <style>
        /* --- CRT EFFECTS & IMPERIAL THEME --- */
        :root {
            --color-primary: #ef4444; /* Imperial Red */
            --color-secondary: #7f1d1d; /* Dark Red */
            --color-bg-dark: #0a0a0a;
            --color-text-muted: #fca5a5;
        }

        @font-face {
            font-family: 'Share Tech Mono';
            src: url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        }

        .aurebesh {
            font-family: 'Aurebesh', sans-serif;
        }

        body {
            background-color: var(--color-bg-dark);
            color: var(--color-primary);
            font-family: 'Share Tech Mono', 'Courier New', Courier, monospace;
            overflow-x: hidden; 
            min-height: 100vh;
        }

        /* CRT Scanline effect */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 50;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* Screen flicker */
        .flicker {
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.98; }
            50% { opacity: 0.95; }
            100% { opacity: 1; }
        }

        .force-wrap {
            word-break: break-word !important;
            overflow-wrap: break-word !important;
            white-space: pre-wrap !important;
        }

        /* Input styling */
        input, select, textarea {
            background-color: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--color-secondary);
            color: #fff;
            outline: none;
            width: 100%;
            padding: 0.5rem;
            font-family: inherit;
            transition: all 0.2s;
        }

        input::placeholder, textarea::placeholder {
            color: var(--color-secondary);
            opacity: 0.5;
        }

        input:focus, select:focus, textarea:focus {
            background-color: rgba(239, 68, 68, 0.1);
            border-color: var(--color-primary);
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.4);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--color-bg-dark); border-left: 1px solid var(--color-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--color-secondary); }
        ::-webkit-scrollbar-thumb:hover { background: var(--color-primary); }

        .glitch-hover:hover {
            animation: textGlitch 0.2s linear infinite;
        }

        @keyframes textGlitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 1px) }
            40% { transform: translate(-1px, -1px) }
            60% { transform: translate(2px, 1px) }
            80% { transform: translate(1px, -1px) }
            100% { transform: translate(0) }
        }

        ::selection {
            background: var(--color-primary);
            color: var(--color-bg-dark);
        }

        .imperial-crest {
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }

        .nav-btn.active {
            background-color: var(--color-primary);
            color: #000;
            font-weight: bold;
        }

        /* Document Specific Styles */
        .doc-font {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        .doc-grid {
            border-top: 1px solid #000;
            border-left: 1px solid #000;
        }
        .doc-cell {
            border-right: 1px solid #000;
            border-bottom: 1px solid #000;
        }
        .barcode {
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: -2px;
            font-weight: 900;
        }
        
        .isb-stamp {
            border: 4px solid #dc2626;
            color: #dc2626;
            padding: 0.25rem 0.5rem;
            font-weight: 900;
            text-transform: uppercase;
            transform: rotate(-12deg);
            display: inline-block;
            font-size: 1.5rem;
            letter-spacing: 0.1em;
            opacity: 0.7;
            mix-blend-mode: multiply;
            position: absolute;
            pointer-events: none;
            z-index: 20;
        }

        .signature-line {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="60" viewBox="0 0 200 60"><path d="M10 45 C 30 10, 50 50, 70 20 C 90 -10, 110 55, 130 35 C 150 15, 170 50, 190 30" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/></svg>');
            background-repeat: no-repeat;
            background-position: center bottom;
            background-size: contain;
        }
    </style>
</head>
<body class="flicker antialiased p-2 md:p-6 flex items-start md:items-center justify-center">

    <div id="app" class="w-full max-w-5xl border border-red-800 bg-black/90 relative z-10 shadow-[0_0_30px_rgba(239,68,68,0.15)] my-4 md:my-0">
        <!-- Content injected via JS -->
    </div>

<script>
    let currentState = 'boot'; 
    let currentFormStep = 1;

    // Default Data Structure
    const defaultFormData = {
        name: '', aliases: '', age: '', dob: '', sex: '', gender: '', orientation: '', species: '', homeworld: '', residence: '', occupation: '', affiliation: '', threatLevel: 'LOW', bounty: '', languages: 'Galactic Basic',
        reputation: '', criminalRecord: '',
        height: '', weight: '', eyeColor: '', skinColor: '', hair: '', build: '', tattoos: '', scars: '', uniqueFeatures: '', cybernetics: '',
        talents: '', skills: '', weaknesses: '', weapons: '', armor: '', attire: '',
        shipName: '', shipClass: '',
        isForceSensitive: 'No', forceAlignment: '', forceAbilities: '', forceMastery: '', lightsaberForms: '',
        likes: '', dislikes: '', motivations: '', fears: '', mentalIllness: '', personality: '',
        backstory: '',
        penisSize: '', breastSize: '', assSize: '', turnOns: '', turnOffs: '', kinks: '', limits: '',
        writingSample: '', misc: '',
        portrait: '' // Base64 image
    };

    // Load from LocalStorage or use default
    let formData = JSON.parse(localStorage.getItem('sw_dossier_data_v2')) || {...defaultFormData};

    const bootSequence = [
        "> ESTABLISHING HOLONET UPLINK... [OK]",
        "> ROUTING THROUGH ENDOR RELAY SUB-NODE... [SECURE]",
        "> INITIATING SCOMP LINK OVERRIDE...",
        "> BYPASSING ISB FIREWALL LAYER 1... [SUCCESS]",
        "> DECRYPTING DATACRON ARCHIVES... [WARNING: TRACE DETECTED]",
        "> <span class='text-yellow-500'>SPOOFING MAC ADDRESS. DEPLOYING COUNTER-MEASURES.</span>",
        "> FILE RETRIEVED - IMPERIAL SECURITY BUREAU DOSSIER LOADED",
        "> ACCESS GRANTED - TERMINAL 47-B (CORUSCANT SHADOW NODE)"
    ];

    function renderApp() {
        const appContainer = document.getElementById('app');
        
        let headerHtml = '';
        if (currentState !== 'boot') {
            headerHtml = `
                <div class="border-b border-red-800 p-3 md:p-4 flex justify-between items-center bg-red-950/40 relative overflow-hidden">
                    <div class="absolute inset-0 opacity-10 pointer-events-none flex items-center justify-center">
                        <span class="aurebesh text-6xl text-red-500">IMPERIAL</span>
                    </div>
                    <div class="flex items-center gap-3 md:gap-4 relative z-10">
                        <div class="imperial-crest w-6 h-6 md:w-8 md:h-8 bg-red-600 flex items-center justify-center shrink-0">
                            <div class="imperial-crest w-4 h-4 md:w-6 md:h-6 bg-black"></div>
                        </div>
                        <div>
                            <h1 class="text-sm md:text-xl font-bold tracking-widest text-red-500 leading-tight">IMPERIAL SECURITY BUREAU</h1>
                            <p class="text-[8px] md:text-[10px] text-red-400/70 tracking-[0.2em]">CORUSCANT SHADOW NODE // TERMINAL 47-B</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4 relative z-10">
                        <button onclick="clearDatabase()" class="text-[9px] border border-red-900 px-2 py-1 hover:bg-red-600 hover:text-black transition-colors hidden sm:block">WIPE LOCAL CACHE</button>
                        <button onclick="clearDatabase()" class="p-1 border border-red-900 hover:bg-red-600 hover:text-black transition-colors sm:hidden" title="Wipe Local Cache"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        <div class="text-right hidden md:block">
                            <p class="text-xs text-red-500/80 uppercase">YEAR: 17 ABY</p>
                            <p class="text-[10px] text-red-500/60 uppercase animate-pulse">AUTO-SAVE: ACTIVE</p>
                        </div>
                    </div>
                </div>
            `;
        }

        appContainer.innerHTML = headerHtml + `<div id="content-area" class="p-3 md:p-8"></div>`;
        
        lucide.createIcons();
        const contentArea = document.getElementById('content-area');

        if (currentState === 'boot') runBootSequence(contentArea);
        else if (currentState === 'welcome') contentArea.innerHTML = renderWelcome();
        else if (currentState === 'form') contentArea.innerHTML = renderForm();
        else if (currentState === 'result') contentArea.innerHTML = renderResult();
    }

    async function runBootSequence(container) {
        container.innerHTML = `<div id="boot-text" class="space-y-2 text-xs md:text-base font-mono"></div>`;
        const bootContainer = document.getElementById('boot-text');
        
        for (let i = 0; i < bootSequence.length; i++) {
            await new Promise(r => setTimeout(r, Math.random() * 300 + 100));
            bootContainer.innerHTML += `<div>${bootSequence[i]}</div>`;
        }
        
        await new Promise(r => setTimeout(r, 600));
        setState('welcome');
    }

    function renderWelcome() {
        return `
            <div class="space-y-8 max-w-2xl mx-auto py-4 md:py-8">
                <div class="text-center space-y-4">
                    <i data-lucide="shield-alert" class="mx-auto text-red-600 w-12 h-12 md:w-16 md:h-16 opacity-80 mb-4"></i>
                    <h2 class="text-lg md:text-2xl font-bold text-center tracking-[0.2em] border-b border-red-800/50 pb-4 text-white">ISB DATACRON UPLINK</h2>
                    <p class="text-xs md:text-sm leading-relaxed text-red-400">
                        Welcome, Operative. You have bypassed the primary security nodes via Scomp Link. 
                        Use this interface to inject or alter a target identity within the Imperial Security Bureau's Galactic Database. 
                        Progress is encrypted and cached locally.
                    </p>
                </div>
                
                <div class="bg-red-950/20 border border-red-900/50 p-4 text-[10px] md:text-xs text-red-300 space-y-2 font-mono relative">
                    <p>> ENCRYPTION: BESKAR-TIER [ACTIVE]</p>
                    <p>> LAST SYNC: 17 ABY 03.18</p>
                    <p>> LOCAL CACHE FRAGMENTS DETECTED: ${Object.values(formData).some(v => v !== '' && v !== 'LOW' && v !== 'Galactic Basic' && v !== 'No') ? '<span class="text-green-500">YES</span>' : '<span class="text-red-500">NO</span>'}</p>
                    <div class="absolute right-4 top-4 opacity-20 text-4xl aurebesh">ISB</div>
                </div>

                <div class="pt-4 flex flex-col sm:flex-row justify-center gap-4">
                    <button onclick="setState('form')" class="px-6 py-3 bg-red-950 hover:bg-red-600 hover:text-black transition-colors border border-red-600 font-bold tracking-[0.2em] glitch-hover flex items-center justify-center gap-3 shadow-[0_0_15px_rgba(239,68,68,0.2)] text-xs md:text-sm w-full sm:w-auto">
                        INITIALIZE OVERRIDE <i data-lucide="terminal-square" class="w-4 h-4"></i>
                    </button>
                    ${Object.values(formData).some(v => v !== '' && v !== 'LOW' && v !== 'Galactic Basic' && v !== 'No') ? `
                    <button onclick="clearDatabase()" class="px-6 py-3 bg-black hover:bg-red-900 transition-colors border border-red-900 text-red-500 font-bold tracking-[0.2em] flex items-center justify-center gap-3 text-xs md:text-sm w-full sm:w-auto">
                        PURGE DATA <i data-lucide="flame" class="w-4 h-4"></i>
                    </button>` : ''}
                </div>
            </div>
        `;
    }

    function renderForm() {
        return `
            <div class="space-y-4 md:space-y-6 flex flex-col h-[75vh] md:h-auto">
                <!-- Form Navigation -->
                <div class="flex overflow-x-auto border-b border-red-900 pb-2 gap-1 md:gap-2 text-[10px] md:text-sm tracking-widest shrink-0 scrollbar-hide">
                    <button onclick="currentFormStep=1; renderApp()" class="nav-btn px-2 md:px-3 py-1 border border-red-900 hover:bg-red-900/50 whitespace-nowrap ${currentFormStep===1 ? 'active' : 'text-red-500'}">1. GENERAL</button>
                    <button onclick="currentFormStep=2; renderApp()" class="nav-btn px-2 md:px-3 py-1 border border-red-900 hover:bg-red-900/50 whitespace-nowrap ${currentFormStep===2 ? 'active' : 'text-red-500'}">2. PHYSICAL</button>
                    <button onclick="currentFormStep=3; renderApp()" class="nav-btn px-2 md:px-3 py-1 border border-red-900 hover:bg-red-900/50 whitespace-nowrap ${currentFormStep===3 ? 'active' : 'text-red-500'}">3. PSYCH</button>
                    <button onclick="currentFormStep=4; renderApp()" class="nav-btn px-2 md:px-3 py-1 border border-red-900 hover:bg-red-900/50 whitespace-nowrap ${currentFormStep===4 ? 'active' : 'text-red-500'}">4. BACKGROUND</button>
                    <button onclick="currentFormStep=5; renderApp()" class="nav-btn px-2 md:px-3 py-1 border border-red-900 hover:bg-red-900/50 whitespace-nowrap ${currentFormStep===5 ? 'active' : 'text-red-500'}">5. RESTRICTED</button>
                </div>

                <div class="flex-grow overflow-y-auto pr-1 md:pr-2 space-y-6 md:h-[50vh]">
                    ${getFormStepContent()}
                </div>

                <div class="pt-3 md:pt-4 border-t border-red-900 flex justify-between items-center gap-2 shrink-0">
                    <button onclick="clearDatabase()" class="px-2 md:px-3 py-2 border border-red-900 text-red-600 hover:bg-red-600 hover:text-black text-[10px] md:text-xs tracking-widest flex items-center gap-1 transition-colors">
                        <i data-lucide="rotate-ccw" class="w-3 h-3"></i> <span class="hidden sm:inline">RESET</span>
                    </button>
                    
                    <span class="text-[10px] md:text-xs text-red-500/50 hidden md:block">SECTOR ${currentFormStep} OF 5</span>
                    
                    <div class="space-x-2 flex">
                        ${currentFormStep > 1 ? `<button onclick="currentFormStep--; renderApp()" class="px-3 md:px-4 py-2 border border-red-800 text-red-500 hover:bg-red-900/30 text-[10px] md:text-xs tracking-widest">PREV</button>` : ''}
                        ${currentFormStep < 5 ? `<button onclick="currentFormStep++; renderApp()" class="px-4 md:px-6 py-2 bg-red-800/20 border border-red-500 text-red-400 hover:bg-red-600 hover:text-black text-[10px] md:text-xs tracking-widest font-bold">NEXT</button>` : ''}
                        ${currentFormStep === 5 ? `<button onclick="generateDossier()" class="px-4 md:px-6 py-2 bg-red-600 text-black border border-red-500 hover:bg-white text-[10px] md:text-xs tracking-widest font-bold glitch-hover shadow-[0_0_10px_rgba(239,68,68,0.5)]">INJECT FILE</button>` : ''}
                    </div>
                </div>
            </div>
        `;
    }

    function handlePortraitUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            updateData('portrait', e.target.result);
            renderApp();
        };
        reader.readAsDataURL(file);
    }

    function createInput(label, id, placeholder, type='text', isTextarea=false) {
        const val = formData[id] || '';
        const baseClass = "w-full bg-black/50 border border-red-900/70 text-red-100 p-2 text-sm focus:border-red-500 focus:bg-red-950/20 outline-none transition-colors";
        const inputHtml = isTextarea 
            ? `<textarea id="${id}" rows="3" placeholder="${placeholder}" class="${baseClass} resize-y" oninput="updateData('${id}', this.value)">${val}</textarea>`
            : `<input type="${type}" id="${id}" placeholder="${placeholder}" class="${baseClass}" value="${val}" oninput="updateData('${id}', this.value)" />`;
        
        return `
            <div class="space-y-1">
                <label class="block text-[10px] uppercase tracking-widest text-red-500/80">> ${label}</label>
                ${inputHtml}
            </div>
        `;
    }

    function updateData(key, value) {
        formData[key] = value;
        localStorage.setItem('sw_dossier_data_v2', JSON.stringify(formData));
        if(key === 'isForceSensitive') renderApp(); 
    }

    function clearDatabase() {
        if(confirm("DANGER: This will permanently purge your cached dossier from this terminal. Continue?")) {
            localStorage.removeItem('sw_dossier_data_v2');
            formData = {...defaultFormData};
            currentFormStep = 1;
            setState('welcome');
        }
    }

    function getFormStepContent() {
        switch(currentFormStep) {
            case 1:
                return `
                    <h3 class="text-red-400 border-b border-red-900/50 pb-2 mb-4 tracking-widest text-sm md:text-base"><i data-lucide="user" class="inline w-4 h-4 mr-2"></i>SUBJECT IDENTIFICATION</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${createInput('Full Name', 'name', '[First and Last]')}
                        ${createInput('Alias(es)', 'aliases', '[Nicknames, Call signs, Titles]')}
                        ${createInput('Age', 'age', '[Standard Galactic Years]')}
                        ${createInput('D.O.B.', 'dob', '[BBY/ABY format. Current year: 17 ABY]')}
                        ${createInput('Sex', 'sex', '[Biological sex]')}
                        ${createInput('Gender', 'gender', '[Identity]')}
                        ${createInput('Species', 'species', '[Known SW Species only]')}
                        ${createInput('Homeworld', 'homeworld', '[Planet of birth]')}
                        ${createInput('Current Residence', 'residence', '[Planet / System / Ship]')}
                        ${createInput('Spoken Languages', 'languages', '[Basic, Huttese, Binary, etc.]')}
                        ${createInput('Occupation', 'occupation', '[Smuggler, Jedi, Trooper, etc.]')}
                        ${createInput('Affiliation', 'affiliation', '[New Republic, Remnant, Hutt Cartel, etc.]')}
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                        <div class="space-y-1">
                            <label class="block text-[10px] uppercase tracking-widest text-red-500/80">> ISB Threat Level</label>
                            <select class="w-full bg-black/50 border border-red-900/70 text-red-100 p-2 text-sm outline-none" onchange="updateData('threatLevel', this.value)">
                                <option value="LOW" ${formData.threatLevel === 'LOW' ? 'selected' : ''}>Low (Civilian)</option>
                                <option value="MODERATE" ${formData.threatLevel === 'MODERATE' ? 'selected' : ''}>Moderate (Local Nuisance)</option>
                                <option value="HIGH" ${formData.threatLevel === 'HIGH' ? 'selected' : ''}>High (Wanted by Empire)</option>
                                <option value="EXTREME" ${formData.threatLevel === 'EXTREME' ? 'selected' : ''}>Extreme (Kill on Sight)</option>
                            </select>
                        </div>
                        ${createInput('Active Bounty', 'bounty', '[Amount in Imperial Credits]')}
                    </div>
                    <div class="mt-4 space-y-4">
                        ${createInput('Galactic Reputation', 'reputation', '[What does the Galaxy/Underworld know you for?]', 'text', true)}
                        ${createInput('Criminal Record', 'criminalRecord', '[Committed crimes against the Empire/Republic]', 'text', true)}
                    </div>
                `;
            case 2:
                return `
                    <h3 class="text-red-400 border-b border-red-900/50 pb-2 mb-4 tracking-widest text-sm md:text-base"><i data-lucide="scan-line" class="inline w-4 h-4 mr-2"></i>BIOMETRICS & PORTRAIT</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                        <div class="space-y-3">
                             <label class="block text-[10px] uppercase tracking-widest text-red-500/80">> Biometric Portrait</label>
                             <div class="w-full aspect-[4/5] max-w-[200px] border-2 border-dashed border-red-900 bg-red-950/20 flex flex-col items-center justify-center p-2 relative overflow-hidden group">
                                ${formData.portrait ? `<img src="${formData.portrait}" class="w-full h-full object-cover" />` : `<i data-lucide="user-plus" class="w-8 h-8 text-red-900 mb-2"></i><span class="text-[8px] text-red-900">NO IMAGE LOADED</span>`}
                                <input type="file" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" onchange="handlePortraitUpload(event)" />
                                <div class="absolute inset-0 bg-red-600/20 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity pointer-events-none">
                                    <span class="text-[10px] font-bold text-white bg-black/80 px-2 py-1">UPLOAD NEW</span>
                                </div>
                             </div>
                             ${formData.portrait ? `<button onclick="updateData('portrait', ''); renderApp()" class="text-[8px] text-red-600 underline uppercase tracking-widest">Wipe Image Data</button>` : ''}
                        </div>
                        <div class="grid grid-cols-1 gap-4">
                            ${createInput('Height', 'height', '[Imperial and Metric]')}
                            ${createInput('Weight', 'weight', '[Imperial and Metric]')}
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${createInput('Eye Color', 'eyeColor', '[Color]')}
                        ${createInput('Skin Color', 'skinColor', '[Color/Tone]')}
                        ${createInput('Hair', 'hair', '[Color and Style/Lekku pattern]')}
                        ${createInput('Body Build', 'build', '[Ectomorph, Mesomorph, etc.]')}
                        ${createInput('Cybernetics', 'cybernetics', '[Prosthetic limbs, neural implants, etc.]')}
                        ${createInput('Tattoos', 'tattoos', '[Description/Location of ink]')}
                    </div>
                    <div class="mt-4">
                        ${createInput('Scars / Unique Features', 'scars', '[Distinctive marks, battle damage, birthmarks]', 'text', true)}
                    </div>
                    <h3 class="text-red-400 border-b border-red-900/50 pb-2 mt-6 mb-4 tracking-widest text-sm md:text-base"><i data-lucide="crosshair" class="inline w-4 h-4 mr-2"></i>COMBAT & EQUIPMENT</h3>
                    <div class="space-y-4">
                        ${createInput('Natural Talents', 'talents', '[Innate abilities, e.g. High IQ, Charismatic]', 'text', true)}
                        ${createInput('Trained Skills', 'skills', '[Acquired skills, e.g. Slicing, Piloting, Marksman]', 'text', true)}
                        ${createInput('Weaknesses', 'weaknesses', '[Physical flaws, limitations]', 'text', true)}
                        ${createInput('Primary Weapons', 'weapons', '[Blaster models, Vibro-weapons]', 'text', true)}
                        ${createInput('Armor System', 'armor', '[Beskar, Plastoid, Durasteel, Shield Generators]', 'text', true)}
                    </div>
                `;
            case 3:
                const forceStyle = formData.isForceSensitive === 'Yes' ? 'block' : 'hidden';
                return `
                    <h3 class="text-red-400 border-b border-red-900/50 pb-2 mb-4 tracking-widest text-sm md:text-base"><i data-lucide="brain" class="inline w-4 h-4 mr-2"></i>PSYCHOLOGICAL PROFILE</h3>
                    <div class="space-y-4">

            setTimeout(() => lucide.createIcons(), 50);
            window.scrollTo(0, 0); 
        }
    }

    async function copyToDiscord() {
        const btn = document.getElementById('copy-btn');
        const target = document.getElementById('capture-zone');
        const originalText = btn.innerHTML;
        btn.innerHTML = `<i data-lucide="loader" class="inline w-4 h-4 mr-2 animate-spin"></i>ENCRYPTING...`;
        btn.disabled = true;

        window.scrollTo(0, 0);

        try {
            await new Promise(r => setTimeout(r, 100));
            const canvas = await html2canvas(target, { 
                backgroundColor: '#ffffff', 
                scale: 2, 
                useCORS: true,
                allowTaint: true,
                logging: false,
                windowWidth: target.scrollWidth,
                windowHeight: target.scrollHeight
            });
            
            canvas.toBlob(async (blob) => {
                try {
                    const item = new ClipboardItem({ "image/png": blob });
                    await navigator.clipboard.write([item]);
                    showStatus("DATACRON TRANSFERRED TO CLIPBOARD", "text-green-500");
                } catch {
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.download = `ISB_Dossier_${formData.name.replace(/\s+/g, '_') || 'Subject'}.png`;
                    link.href = url;
                    link.click();
                    showStatus("CLIPBOARD BLOCKED. DATACRON DOWNLOADED.", "text-yellow-500");
                }
            });
        } catch(err) {
            console.error(err);
            showStatus("ENCRYPTION ERROR.", "text-red-500");
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
            lucide.createIcons();
        }
    }

    function showStatus(msg, cls) {
        const status = document.getElementById('copy-status');
        if(!status) return;
        status.textContent = msg;
        status.className = `text-center text-[10px] md:text-xs font-bold uppercase mt-4 transition-opacity opacity-100 ${cls} tracking-widest h-4`;
        setTimeout(() => status.classList.replace('opacity-100', 'opacity-0'), 4000);
    }

    document.addEventListener('DOMContentLoaded', renderApp);
</script>
</body>
</html>
